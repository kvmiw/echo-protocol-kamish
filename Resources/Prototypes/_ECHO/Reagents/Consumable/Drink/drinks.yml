  color: "#5f341c"
  metamorphicSprite:
    sprite: _ECHO/Objects/Consumable/Drinks/cocoa_drink.rsi
    state: icon_empty
  metamorphicMaxFillLevels: 5
  metamorphicFillBaseName: fill-
  metamorphicChangeColor: false
  metabolisms:
    Drink:
      effects:
      - !type:SatiateThirst
        factor: 3
      - !type:GenericStatusEffect
        key: StaminaModifier
        component: StaminaModifier
