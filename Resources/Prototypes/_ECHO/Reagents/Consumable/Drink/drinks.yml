- type: reagent
  id: EchoSummerShade
  name: summer-shade-name
  parent: BaseDrink
  desc: summer-shade-desc
  physicalDesc: reagent-physical-desc-refreshing
  flavor: Echo_summershade
  color: "#FF2B2B"
  recognizable: false
  metamorphicSprite:
    sprite: _ECHO/Objects/Consumable/Drinks/summershade.rsi
    state: icon_empty
  metamorphicMaxFillLevels: 5
  metamorphicFillBaseName: fill-
  metamorphicChangeColor: false
  metabolisms:
    Digestion:
      effects:
      - !type:SatiateThirst
        factor: 5
      - !type:AdjustTemperature
        conditions:
