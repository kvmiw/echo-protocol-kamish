- type: reagent
  id: ECHOAppleLiqueur
  name: apple-liqueur-name
  parent: ECHOSugarKnight
  desc: apple-liqueur-desc
  physicalDesc: reagent-physical-desc-cloudy
  flavor: ECHO_appleliqueur
  color: "#47941b"
  recognizable: true
  metamorphicSprite:
    sprite: ECHO/Objects/Consumable/Drinks/apple_liqueur_glass.rsi
    state: icon_empty
  metamorphicMaxFillLevels: 5
  metamorphicFillBaseName: fill-
  metamorphicChangeColor: false
  metabolisms:
    Drink:
      effects:
      - !type:SatiateThirst
        factor: 2
      - !type:AdjustReagent
        reagent: Ethanol
        amount: 0.05

