#Наши базовые алкогольные напитки

- type: reagent
  id: EchoAppleLiqueur
  name: apple-liqueur-name
  parent: BaseAlcohol
  desc: apple-liqueur-desc
  physicalDesc: reagent-physical-desc-cloudy
  flavor: Echo_appleliqueur
  color: "#47941b"
  recognizable: true
  metamorphicSprite:
    sprite: _ECHO/Objects/Consumable/Drinks/apple_liqueur_glass.rsi
    state: icon_empty
  metamorphicMaxFillLevels: 5
  metamorphicFillBaseName: fill-
  metamorphicChangeColor: false
  metabolisms:
    Digestion:
      metabolites:
        Ethanol: 0.05

