- type: entity
  parent: BaseFoodCondiment
  id: EchoBaseTeapack
  abstract: true
  components:
  - type: Item
    size: Tiny
  - type: Openable
    sound:
      collection: packetOpenSounds
  - type: InjectableSolution
    solution: food
  - type: SolutionContainerManager
    solutions:
      food:
        maxVol: 5
  - type: SolutionTransfer
    maxTransferAmount: 5
  - type: PhysicalComposition
    materialComposition:
      Plastic: 50
  - type: Tag
    tags:
      - EchoTeaPack

- type: entity
  parent: EchoBaseTeapack
  id: EchoOrangeTeapack
  name: EchoOrangeTeapack
  description: its teapack with orange tea.
  components:
  - type: SolutionContainerManager
    solutions:
      food:
        maxVol: 5
        reagents:
        - ReagentId: EchoOrangepackReg
          Quantity: 5
  - type: Sprite
    sprite: _ECHO/Objects/Consumable/Drinks/orangetea.rsi
    state: teapack
  - type: Icon
    sprite: _ECHO/Objects/Consumable/Drinks/orangetea.rsi
    state: teapack
  - type: Appearance
  - type: FlavorProfile
    flavors:
      - bitter
      - metallic

