- type: entity
  name: EchoOrangeTeapack
  parent: DrinkBase
  id: EchoOrangeTeapack
  description: its teapack with orange tea.
  components:
  - type: Tag
    tags:
    - EchoTeaPack
  - type: FlavorProfile
    flavors:
      - bitter
      - metallic
  - type: Sprite
    sprite: _ECHO/Objects/Consumable/Drinks/orangetea.rsi
    state: teapack
  - type: SolutionContainerManager
    solutions:
      drink:
        maxVol: 5
        reagents:
        - ReagentId: EchoOrangepackReg
          Quantity: 5
  - type: Item
    size: Tiny

