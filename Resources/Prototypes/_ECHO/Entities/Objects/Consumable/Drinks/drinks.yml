#Безалкогольные коктейли от Кекса/Стычинского

- type: entity
  parent: DrinkGlass
  id: ECHODrinkSummerShadeGlass
  suffix: SummerShade
  components:
  - type: SolutionContainerManager
    solutions:
      drink:
        maxVol: 30
        reagents:
        - ReagentId: ECHOSummerShade
          Quantity: 30
  - type: Sprite
    sprite: _ECHO/Objects/Consumable/Drinks/summershade.rsi
    layers:
    - state: icon

