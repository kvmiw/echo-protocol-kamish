- type: entity
  parent: BaseFoodCondiment
  id: EchoBaseYupiPacket
  name: yupi packet
  abstract: true
  components:
  - type: Item
    size: Tiny
  - type: Openable
    sound:
      collection: packetOpenSounds
  - type: InjectableSolution
    solution: food
  - type: SolutionContainerManager
    solutions:
      food:
        maxVol: 5
  - type: SolutionTransfer
    maxTransferAmount: 5
  - type: Sprite
    sprite: _ECHO/Objects/Consumable/Drinks/yupi.rsi
  - type: Icon
    sprite: _ECHO/Objects/Consumable/Drinks/yupi.rsi
  - type: PhysicalComposition
    materialComposition:
      Plastic: 50
  - type: Tag
    tags:
      - EchoYupiPack

- type: entity
  parent: EchoBaseYupiPacket
  id: EchoYupiPacketApple
  name: apple yupi packet
  description: A yupi packet with apple taste.
  components:
  - type: SolutionContainerManager
    solutions:
      food:
        maxVol: 5
        reagents:
        - ReagentId: EchoYupiDryApple
          Quantity: 5
  - type: Sprite
    state: packet-apple
  - type: Icon
    state: packet-apple
  - type: Appearance

