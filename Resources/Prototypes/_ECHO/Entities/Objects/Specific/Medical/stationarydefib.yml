- type: entity
  id: BaseStationaryDefibrillator
  parent: BaseItem
  name: stationary defibrillator
  description: .
  abstract: true
  components:
    - type: Sprite
      sprite: Objects/Specific/Medical/defib.rsi
      layers:
        - state: icon
        - state: screen
          visible: true
          shader: unshaded
    - type: Appearance
    - type: Item
      size: Normal
    - type: Speech
      speechVerb: Robotic
      soundActivate:
        path: /Audio/Items/Defib/defib_safety_on.ogg
    - type: Defibrillator
      zapHeal:
        types:
          Asphyxiation: -40
      energyCost: 100
    - type: DoAfter
    - type: UseDelay
    - type: Battery
      maxCharge: 100
      startingCharge: 100

- type: entity
  id: StationaryDefibrillator
  parent: [ BaseStationaryDefibrillator ]
  components:
  - type: MultiHandedItem
    useCharge: 100
  - type: ExaminableBattery
