- type: entity
  id: BookSpaceLaw
  parent: BaseItem
  name: space law
  description: A set of Nanotrasen guidelines for keeping law and order on their space stations.
  components:
  - type: Sprite
    sprite: ECHO/Objects/Misc/books.rsi
    layers:
    - state: KZ
  - type: Tag
    tags:
    - Book
  - type: MeleeWeapon # so you can teach using PAIN
    soundHit:
      collection: Punch
    damage:
      types:
        Blunt: 1

