- type: entity
  id: EchoGlobeTerra
  parent: BaseItem
  name: Earth globe
  description: Earth - the home planet of the human race. The globe shows the capitals of many nations, some of which are now underwater.
  components:
  - type: Sprite
    sprite: _ECHO/Objects/Misc/globes.rsi
    state: terra
  - type: Item
    size: Small
  - type: Anchorable

- type: entity
  id: EchoGlobeMoon
  parent: BaseItem
  name: Moon globe
  description: The moon once looked like this, but...
  components:
  - type: Sprite
    sprite: _ECHO/Objects/Misc/globes.rsi
    state: moon
  - type: Item
    size: Small
  - type: Anchorable

- type: entity
  id: EchoGlobeEurope
  parent: BaseItem
  name: Europa globe
  description: A globe of Jupiter's moon. The only thing that managed to settle there is a graveyard of drilling rigs beneath miles of ice.
  components:
  - type: Sprite
    sprite: _ECHO/Objects/Misc/globes.rsi
    state: europe
  - type: Item
    size: Small
  - type: Anchorable

- type: entity
  id: EchoFloorGlobus
  parent: BaseStructure
  name: floor globe
  description: A decorative floor globe.
  components:
  - type: Sprite
    sprite: _ECHO/Structures/Furniture/floor_globus.rsi
    state: floor_globus
  - type: Icon
    sprite: _ECHO/Structures/Furniture/floor_globus.rsi
    state: floor_globus
  - type: Damageable
    damageContainer: StructuralInorganic
    damageModifierSet: Metallic
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 100
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
    - trigger:
        !type:DamageTrigger
        damage: 50
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: GlassBreak
          params:
            volume: -6
      - !type:SpawnEntitiesBehavior
        spawn:
          SheetGlass1:
            min: 1
            max: 2
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
  - type: Anchorable
  - type: Rotatable
  - type: InteractionOutline
  - type: Clickable
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.3,-0.3,0.3,0.3"
        density: 100
        mask:
        - MachineMask
        layer:
        - MidImpassable
        - LowImpassable