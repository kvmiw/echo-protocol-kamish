- type: entity
  id: EchoStatueAngel
  parent: BaseStructure
  name: statue of an angel
  description: An angel-guardian who protects you from all troubles and misfortunes. Guardian-protector, and in the difficult hour of your life, he will help you overcome difficulties, guardian!
  components:
  - type: Sprite
    noRot: true
    sprite: _ECHO/Structures/Decoration/Statues/angel.rsi
    state: angel
    drawdepth: Mobs
    offset: "0.0,0.5"
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.5,-0.5,0.5,1.5"
        density: 60
        mask:
        - MachineMask
        layer:
        - MidImpassable
        - LowImpassable
  - type: Damageable
    damageContainer: StructuralInorganic
    damageModifierSet: Metallic
  - type: Destructible
    thresholds:
      - trigger:
          !type:DamageTrigger
          damage: 150
        behaviors:
          - !type:DoActsBehavior
            acts: [ "Destruction" ]
  - type: Construction
    graph: EchoStatueAngel
    node: statue

